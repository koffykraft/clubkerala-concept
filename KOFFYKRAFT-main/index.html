<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KoffyKraft</title>
  <meta name="description" content="KoffyKraft: coffee, leaf, estate, and notes from Karavaloor.">
  <link rel="stylesheet" href="assets/site/minimal.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="index.html" class="site-logo">KoffyKraft</a>
      <button class="menu-toggle" aria-label="Toggle menu" aria-expanded="false" aria-controls="mainNav" onclick="toggleMenu(this)">☰</button>
      <nav class="site-nav" id="mainNav" aria-label="Primary">
        <a href="coffee/roastery/buy/">Buy</a>
        <a href="coffee/roastery/browse/">Coffees</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container">
        <div class="hero-image">
          <img src="assets/site/sample-roaster-full.jpg" alt="KoffyKraft roaster">
        </div>
        <h1>KoffyKraft</h1>
      </div>
    </section>

    <section class="section" id="doors">
      <div class="container">
        <nav class="door-nav" aria-label="KoffyKraft doors">
          <a href="coffee/">Coffee</a>
          <a href="buna/">Buna</a>
          <a href="estate/">Estate</a>
          <a href="links/">Links</a>
        </nav>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Karavaloor</p>
      <p>Kerala</p>
    </div>
  </footer>

  <script>
    function toggleMenu(btn) {
      var nav = document.getElementById('mainNav');
      var open = nav.classList.toggle('active');
      if (btn) btn.setAttribute('aria-expanded', open ? 'true' : 'false');
    }
  </script>
</body>
</html>
