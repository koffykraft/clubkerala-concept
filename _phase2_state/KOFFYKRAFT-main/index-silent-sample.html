<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KoffyKraft</title>
  <meta name="description" content="KoffyKraft: coffee, Buna, Citane, brewing, cupping, and estate notes from Karavaloor.">
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400&family=Cormorant+Garamond:wght@300&display=swap");

    :root {
      --ink: #111;
      --muted: #7b7b76;
      --line: #efefeb;
      --gutter: clamp(24px, 6vw, 96px);
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      background: #fff;
      color: var(--ink);
      font-family: "Barlow Condensed", "Arial Narrow", "Aptos Narrow", "Helvetica Neue", Arial, sans-serif;
    }

    a { color: inherit; }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .top,
    .foot {
      min-height: 92px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 28px;
      padding: 26px var(--gutter);
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .brand {
      font-size: clamp(30px, 3vw, 46px);
      font-weight: 300;
      letter-spacing: -0.02em;
      text-transform: none;
      text-decoration: none;
    }

    .top a:not(.brand),
    .foot a,
    .room a {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      text-decoration: none;
    }

    .top a:not(.brand):hover,
    .foot a:hover,
    .room a:hover,
    .index a:hover {
      text-decoration: underline;
      text-underline-offset: 8px;
    }

    .first {
      min-height: calc(100vh - 92px);
      display: grid;
      grid-template-columns: minmax(0, 0.72fr) minmax(260px, 0.42fr);
      align-items: center;
      gap: clamp(64px, 12vw, 190px);
      padding: clamp(70px, 11vw, 162px) var(--gutter);
    }

    .first h1 {
      margin: 0;
      font-family: "Cormorant Garamond", Garamond, "Times New Roman", serif;
      font-size: clamp(84px, 12vw, 178px);
      font-weight: 300;
      letter-spacing: -0.055em;
      line-height: 0.82;
    }

    .first figure,
    .room figure,
    .first img,
    .room img {
      margin: 0;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: contain;
      filter: saturate(0.62) contrast(0.94) brightness(1.06);
    }

    .first img {
      max-height: 62vh;
      object-fit: contain;
    }

    .first figure {
      grid-column: 2;
    }

    .rooms {
      padding: clamp(46px, 8vw, 120px) var(--gutter) clamp(104px, 15vw, 240px);
    }

    .mosaic {
      max-width: 1180px;
      margin: 0 auto;
      padding: clamp(40px, 8vw, 110px) var(--gutter) clamp(110px, 16vw, 240px);
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: clamp(28px, 5vw, 86px) clamp(22px, 4vw, 62px);
      align-items: center;
    }

    .photo {
      display: block;
      text-decoration: none;
      outline-offset: 14px;
      margin-block: 0;
    }

    .photo img {
      max-height: 74vh;
      object-fit: contain;
    }

    .photo.small { grid-column: span 4; }
    .photo.medium { grid-column: span 5; }
    .photo.large { grid-column: span 7; }
    .photo.full { grid-column: 2 / span 10; }
    .photo.push { margin-top: clamp(54px, 9vw, 140px); }
    .photo.lower { margin-top: clamp(96px, 14vw, 220px); }
    .photo.right { justify-self: end; }

    .room {
      max-width: 1220px;
      min-height: 88vh;
      margin: 0 auto clamp(108px, 15vw, 240px);
      display: grid;
      grid-template-columns: minmax(0, 0.62fr) minmax(160px, 0.28fr);
      align-items: center;
      gap: clamp(46px, 9vw, 150px);
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .room:nth-child(even) {
      grid-template-columns: minmax(160px, 0.28fr) minmax(0, 0.62fr);
    }

    .room:last-child { margin-bottom: 0; }

    .room img {
      max-height: 78vh;
      object-fit: contain;
    }

    .room nav {
      display: grid;
      gap: 16px;
      justify-content: start;
      color: #20201d;
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .index {
      min-height: 78vh;
      display: grid;
      align-items: center;
      padding: clamp(96px, 14vw, 204px) var(--gutter);
      border-top: 1px solid var(--line);
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .index-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 1px;
      max-width: 1160px;
      background: var(--line);
    }

    .index a {
      min-height: 142px;
      display: flex;
      align-items: end;
      padding: 24px;
      background: #fff;
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      text-decoration: none;
    }

    .foot {
      min-height: 104px;
      border-top: 1px solid var(--line);
      color: var(--muted);
    }

    @media (max-width: 760px) {
      .top,
      .foot {
        min-height: 86px;
        align-items: flex-start;
        flex-direction: column;
        padding: 24px;
      }

      .first,
      .room,
      .room:nth-child(even),
      .index-grid,
      .mosaic {
        grid-template-columns: 1fr;
      }

      .first {
        min-height: auto;
        padding: 54px 24px 92px;
      }

      .first figure {
        order: -1;
        width: min(260px, 72vw);
        justify-self: center;
      }

      .first h1 {
        font-size: clamp(82px, 23vw, 120px);
      }

      .rooms,
      .index {
        padding-left: 24px;
        padding-right: 24px;
      }

      .room {
        min-height: auto;
      }

      .room nav {
        min-height: 96px;
        align-content: start;
      }

      .index a {
        min-height: 84px;
      }

      .photo,
      .photo.small,
      .photo.medium,
      .photo.large,
      .photo.full {
        grid-column: 1;
        margin-top: 0;
      }

      .photo img {
        max-height: none;
      }
    }

    @media print {
      .first,
      .rooms,
      .mosaic,
      .room,
      .photo,
      .index,
      .foot {
        break-inside: avoid;
        page-break-inside: avoid;
      }

      .room {
        min-height: auto;
        margin-bottom: 90px;
      }
    }
  </style>
</head>
<body>
  <header class="top">
    <a class="brand" href="index.html" aria-label="KoffyKraft home">KoffyKraft</a>
    <a href="#index">index</a>
  </header>

  <main>
    <section class="first">
      <figure>
        <img src="assets/site/sample-roaster-full.jpg" alt="KoffyKraft roaster">
      </figure>
    </section>

    <section class="mosaic" aria-label="KoffyKraft photographs">
      <figure class="photo large">
        <img src="assets/site/home-estate-quiet.jpg" alt="KoffyKraft estate">
      </figure>

      <figure class="photo small push right">
        <img src="assets/site/estate-ground.jpg" alt="Coffee plants at the estate">
      </figure>

      <a class="photo medium lower" href="learn/" aria-label="Coffee">
        <img src="assets/site/home-beans.jpg" alt="Roasted coffee beans">
      </a>

      <a class="photo medium right" href="citane/" aria-label="Citane">
        <img src="assets/site/citane-leaf-pack.jpg" alt="Citane coffee leaf pack">
      </a>

      <a class="photo full" href="buna/" aria-label="Buna">
        <img src="assets/site/buna-landscape.jpg" alt="Buna landscape sheet">
      </a>

      <a class="photo small" href="citane/" aria-label="Citane">
        <img src="assets/site/citane-amber-cup.jpg" alt="Amber Citane brew">
      </a>

      <a class="photo medium push right" href="learn/" aria-label="Coffee">
        <img src="assets/site/sample-fire.jpg" alt="Roasting fire">
      </a>

      <a class="photo medium" href="learn/" aria-label="Coffee">
        <img src="assets/site/home-beans.jpg" alt="Roasted coffee beans">
      </a>

      <a class="photo small lower right" href="citane/" aria-label="Citane">
        <img src="assets/site/sample-leaf-processed.jpg" alt="Processed coffee leaves">
      </a>
      <span class="sr-only">Coffee, Buna, Citane, Brewing, Cupping, Estate</span>
    </section>

    <section id="index" class="index">
      <div class="index-grid">
        <a href="learn/">Coffee</a>
        <a href="training/quiet/brewing/">Brewing</a>
        <a href="training/quiet/cupping/">Cupping</a>
        <a href="buna/">Buna</a>
        <a href="citane/">Citane</a>
      </div>
    </section>
  </main>

  <footer class="foot">
    <span>Karavaloor</span>
    <a href="#note">note</a>
  </footer>
</body>
</html>
