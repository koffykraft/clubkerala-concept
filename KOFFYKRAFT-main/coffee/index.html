<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Coffee | KoffyKraft</title>
  <meta name="description" content="KoffyKraft coffee: roastery, learning, notes, photos, and papers.">
  <link rel="stylesheet" href="../assets/site/minimal.css">
  <link rel="stylesheet" href="../assets/site/coffee-content.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="../" class="site-logo">KoffyKraft</a>
      <button class="menu-toggle" aria-label="Toggle menu" aria-expanded="false" aria-controls="mainNav" onclick="toggleMenu(this)">☰</button>
      <nav class="site-nav" id="mainNav" aria-label="Primary">
        <a href="roastery/buy/">Buy</a>
        <a href="roastery/browse/">Coffees</a>
      </nav>
    </div>
  </header>

  <div class="breadcrumb">
    <div class="container">
      <nav aria-label="Breadcrumb">
        <a href="../">Home</a>
        <span>/</span>
        <span>Coffee</span>
      </nav>
    </div>
  </div>

  <main>
    <section class="page-title">
      <div class="container">
        <h1>Coffee</h1>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="coffee-panel">
          <figure>
            <img src="../assets/site/home-beans.jpg" alt="Roasted coffee beans">
          </figure>
          <nav class="door-list" aria-label="Coffee doors">
            <a class="door" href="roastery/">Roastery</a>
            <a class="door" href="../training/quiet/">Learn</a>
            <a class="door" href="../training/deeper-dive/">Notes</a>
            <a class="door" href="../links/">Papers</a>
          </nav>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Coffee</p>
      <a href="../">Home</a>
    </div>
  </footer>

  <script>
    function toggleMenu(btn) {
      var nav = document.getElementById('mainNav');
      var open = nav.classList.toggle('active');
      if (btn) btn.setAttribute('aria-expanded', open ? 'true' : 'false');
    }
  </script>
</body>
</html>
