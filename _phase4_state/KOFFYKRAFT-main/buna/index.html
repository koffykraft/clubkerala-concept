<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Buna | KoffyKraft</title>
  <meta name="description" content="Buna at KoffyKraft: coffee leaf beverage, cultural brewing traditions, methods, learning, and library.">
  <link rel="stylesheet" href="../assets/site/minimal.css">
  <link rel="stylesheet" href="../assets/site/buna-content.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="../" class="site-logo">KoffyKraft</a>
      <button class="menu-toggle" aria-label="Toggle menu" aria-expanded="false" aria-controls="mainNav" onclick="toggleMenu(this)">☰</button>
      <nav class="site-nav" id="mainNav" aria-label="Primary">
        <a href="../coffee/roastery/buy/">Buy</a>
        <a href="../coffee/roastery/browse/">Coffees</a>
      </nav>
    </div>
  </header>

  <div class="breadcrumb">
    <div class="container">
      <nav aria-label="Breadcrumb">
        <a href="../">Home</a>
        <span>/</span>
        <span>Buna</span>
      </nav>
    </div>
  </div>

  <main>
    <section class="page-title">
      <div class="container">
        <h1>Buna</h1>

    </section>

    <section class="section">
      <div class="container">
        <div class="buna-panel">
          <figure>
            <div class="image-space" aria-hidden="true"></div>

    <div class="container">
      <p>Buna</p>
      <a href="../">Home</a>

  </footer>

  <script>
    function toggleMenu(btn) {
      var nav = document.getElementById('mainNav');
      var open = nav.classList.toggle('active');
      if (btn) btn.setAttribute('aria-expanded', open ? 'true' : 'false');
    }
  </script>
</body>
</html>
