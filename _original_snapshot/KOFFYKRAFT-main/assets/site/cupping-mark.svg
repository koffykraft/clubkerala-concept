<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 360" role="img" aria-labelledby="title desc">
  <title id="title">Cupping mark</title>
  <desc id="desc">A loose pencil-like line drawing of three cupping bowls.</desc>
  <defs>
    <filter id="soft-pencil" x="-8%" y="-8%" width="116%" height="116%">
      <feTurbulence type="fractalNoise" baseFrequency="0.95" numOctaves="2" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <style>
      .line {
        fill: none;
        stroke: #34302b;
        stroke-width: 5.2;
        stroke-linecap: round;
        stroke-linejoin: round;
        filter: url(#soft-pencil);
      }
      .thin {
        stroke-width: 3.1;
        opacity: 0.72;
      }
      .coffee {
        fill: #4b3428;
        opacity: 0.9;
        filter: url(#soft-pencil);
      }
      .ghost {
        stroke: #9a9287;
        opacity: 0.34;
      }
    </style>
  </defs>

