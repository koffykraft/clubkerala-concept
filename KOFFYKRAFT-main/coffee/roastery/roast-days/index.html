<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Roast Days | KoffyKraft</title>
  <meta name="description" content="KoffyKraft roast days and roast-to-order practice.">
  <link rel="stylesheet" href="../../../assets/site/minimal.css">

</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="../../../" class="site-logo">KoffyKraft</a>
      <button class="menu-toggle" aria-label="Toggle menu" aria-expanded="false" aria-controls="mainNav" onclick="toggleMenu(this)">☰</button>
      <nav class="site-nav" id="mainNav" aria-label="Primary">

        <a href="../browse/">Coffees</a>

  <div class="breadcrumb">

      <nav aria-label="Breadcrumb">
        <a href="../../../">Home</a>
        <span>/</span>
        <a href="../../">Coffee</a>
        <span>/</span>
        <a href="../">Roastery</a>
        <span>/</span>
        <span>Roast Days</span>
      </nav>
    </div>
  </div>

  <main>
    <section class="page-title">
      <div class="container">
        <h1>Roast Days</h1>

    <section class="section">

    <div class="container">
      <p>Roast Days</p>
      <a href="../../../">Home</a>
    </div>
  </footer>

  <script>
    function toggleMenu(btn) {
      var nav = document.getElementById('mainNav');
      var open = nav.classList.toggle('active');
      if (btn) btn.setAttribute('aria-expanded', open ? 'true' : 'false');
    }
  </script>

</html>
