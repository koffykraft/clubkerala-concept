<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Buy | KoffyKraft</title>
  <meta name="description" content="Buy KoffyKraft coffee.">
  <link rel="stylesheet" href="../../../assets/site/minimal.css">
  <link rel="stylesheet" href="../../../assets/site/coffee-content.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="../../../" class="site-logo">KoffyKraft</a>
      <button class="menu-toggle" aria-label="Toggle menu" aria-expanded="false" aria-controls="mainNav" onclick="toggleMenu(this)">☰</button>
      <nav class="site-nav" id="mainNav" aria-label="Primary">
        <a href="../../../coffee/roastery/buy/" aria-current="page">Buy</a>
        <a href="../../../coffee/roastery/browse/">Coffees</a>
      </nav>
    </div>
  </header>

  <div class="breadcrumb">
    <div class="container">
      <nav aria-label="Breadcrumb">
        <a href="../../../">Home</a>
        <span>/</span>
        <a href="../../">Coffee</a>
        <span>/</span>
        <a href="../">Roastery</a>
        <span>/</span>
        <span>Buy</span>
      </nav>
    </div>
  </div>

  <main>
    <section class="page-title">
      <div class="container">
        <h1>Buy</h1>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="coffee-panel">
          <figure>
            <img src="../../../assets/site/koffykraft-coffee-bag.jpg" alt="KoffyKraft roasted coffee bag">
          </figure>
          <div>
            <p class="small-note">KoffyKraft is a garage roastery. Coffees are usually roasted to order on roast days. Washed coffees are the usual focus; other processes appear when they make sense.</p>
            <nav class="door-list" aria-label="Buy doors">
              <a class="door" href="../browse/">Coffees</a>
              <a class="door" href="../roast-days/">Roast Days</a>
              <a class="door" href="../../../training/quiet/brewing/">Brew</a>
              <a class="door" href="../">Roastery</a>
            </nav>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>Buy</p>
      <a href="../../../">Home</a>
    </div>
  </footer>

  <script>
    function toggleMenu(btn) {
      var nav = document.getElementById('mainNav');
      var open = nav.classList.toggle('active');
      if (btn) btn.setAttribute('aria-expanded', open ? 'true' : 'false');
    }
  </script>
</body>
</html>
